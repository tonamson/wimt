# Config: copy .env.example → .env (Compose loads .env for ${VAR} substitution).
services:
  gateway:
    image: caddy:2-alpine
    container_name: wimt-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WIMT_PORT:-4393}:4393"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      wimt:
        condition: service_started
      headroom:
        condition: service_started

  wimt:
    build:
      context: ./frontend
    container_name: wimt
    restart: unless-stopped
    expose:
      - "4393"
    environment:
      WIMT_DB_PATH: /app/data/wimt.sqlite
      PROXY_PUBLIC_BASE_URL: ${PROXY_PUBLIC_BASE_URL:-http://127.0.0.1:4393}
      OPENAI_UPSTREAM_BASE_URL: ${OPENAI_UPSTREAM_BASE_URL:-https://api.openai.com}
      ANTHROPIC_UPSTREAM_BASE_URL: ${ANTHROPIC_UPSTREAM_BASE_URL:-https://api.anthropic.com}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-auto}
      WIMT_RETENTION_DAYS: ${WIMT_RETENTION_DAYS:-14}
      WIMT_LOG_BODIES: ${WIMT_LOG_BODIES:-1}
      WIMT_LOG_BODY_MAX: ${WIMT_LOG_BODY_MAX:-8000}
      WIMT_DEBUG_USAGE: ${WIMT_DEBUG_USAGE:-}
    volumes:
      - ./frontend/data:/app/data

  # Headroom proxy: built from PyPI (pip install headroom-ai[proxy]), not GHCR image.
  # Docs: https://headroom-docs.vercel.app/docs/quickstart
  #        https://headroom-docs.vercel.app/docs/proxy#docker
  #
  # Always reinstall latest on rebuild:
  #   HEADROOM_CACHEBUST=$(date +%s) docker compose build headroom
  # Or pin a version:
  #   HEADROOM_VERSION=0.32.0 docker compose build headroom
  headroom:
    build:
      context: ./headroom
      args:
        HEADROOM_CACHEBUST: ${HEADROOM_CACHEBUST:-0}
        HEADROOM_VERSION: ${HEADROOM_VERSION:-}
    container_name: headroom
    command:
      - headroom
      - proxy
      - --host
      - "0.0.0.0"
      - --port
      - "8787"
      - --backend
      - anthropic
      - --anthropic-api-url
      - "http://wimt:4393"
      - --log-file
      - "/root/.headroom/requests.jsonl"
    expose:
      - "8787"
    volumes:
      - headroom-data:/root/.headroom
    restart: unless-stopped
    depends_on:
      - wimt
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  headroom-data:
